name: Android E2E

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag_expression:
        description: Cucumber tag expression (e.g. "@smoke and @android")
        required: false
        default: "@smoke and @android"

concurrency:
  group: android-e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  JAVA_VERSION: "17"
  ANDROID_API_LEVEL: "34"
  ANDROID_TARGET: "google_apis"
  ANDROID_ARCH: "x86_64"
  EMULATOR_PROFILE: "pixel_6"

jobs:
  static-checks:
    name: Static checks (typecheck + lint)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint . --max-warnings=0
        continue-on-error: true

  android-e2e:
    name: Android E2E (API ${{ matrix.api-level }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        api-level: [34]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Install Appium driver
        run: |
          export APPIUM_HOME="$GITHUB_WORKSPACE/.appium"
          mkdir -p "$APPIUM_HOME"
          npx appium driver install uiautomator2

      - name: Verify APK present
        run: |
          if [ ! -f "$GITHUB_WORKSPACE/apps/android/QA-Lab.apk" ]; then
            echo "::error::apps/android/QA-Lab.apk not found in the repo"
            exit 1
          fi
          ls -lh "$GITHUB_WORKSPACE/apps/android/QA-Lab.apk"

      - name: Cache AVD
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ matrix.api-level }}-${{ env.ANDROID_TARGET }}-${{ env.ANDROID_ARCH }}-v2

      - name: Run E2E suite (boot emulator + test)
        uses: reactivecircus/android-emulator-runner@v2
        env:
          TAG_EXPRESSION: ${{ github.event.inputs.tag_expression }}
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ env.ANDROID_TARGET }}
          arch: ${{ env.ANDROID_ARCH }}
          profile: ${{ env.EMULATOR_PROFILE }}
          force-avd-creation: ${{ steps.avd-cache.outputs.cache-hit != 'true' }}
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: bash scripts/ci-android-e2e.sh

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-api-${{ matrix.api-level }}
          path: test-results/allure-results
          if-no-files-found: warn
          retention-days: 14

      - name: Upload diagnostic evidence (screenshots + logs + flake report)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostic-evidence-api-${{ matrix.api-level }}
          path: |
            test-results/screenshots
            test-results/logs
            test-results/*.xml
            test-results/flake-report.txt
          if-no-files-found: warn
          retention-days: 14

      - name: Surface flake report in run summary
        if: always()
        run: |
          if [ -s test-results/flake-report.txt ]; then
            {
              echo "## ⚠️ Flake report"
              echo
              echo "The following specs failed on the first attempt and were retried."
              echo "Each line is a spec that hid a transient failure behind a retry."
              echo
              echo '```'
              cat test-results/flake-report.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## ✅ No flakes detected in this run" >> "$GITHUB_STEP_SUMMARY"
          fi
