name: Android E2E

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag_expression:
        description: Cucumber tag expression (e.g. "@smoke and @android")
        required: false
        default: "@smoke and @android"

concurrency:
  group: android-e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  JAVA_VERSION: "17"
  ANDROID_API_LEVEL: "34"
  ANDROID_TARGET: "google_apis"
  ANDROID_ARCH: "x86_64"
  EMULATOR_PROFILE: "pixel_6"

jobs:
  static-checks:
    name: Static checks (typecheck + lint)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint . --max-warnings=0
        continue-on-error: true

  android-e2e:
    name: Android E2E (API ${{ matrix.api-level }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        api-level: [34]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Install Appium driver
        run: |
          export APPIUM_HOME="$GITHUB_WORKSPACE/.appium"
          mkdir -p "$APPIUM_HOME"
          npx appium driver install uiautomator2

      - name: Verify APK present
        run: |
          if [ ! -f "$GITHUB_WORKSPACE/apps/android/QA-Lab.apk" ]; then
            echo "::error::apps/android/QA-Lab.apk not found in the repo"
            exit 1
          fi
          ls -lh "$GITHUB_WORKSPACE/apps/android/QA-Lab.apk"

      - name: Cache AVD
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ matrix.api-level }}-${{ env.ANDROID_TARGET }}-${{ env.ANDROID_ARCH }}-v2

      - name: Run E2E suite (boot emulator + test)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ env.ANDROID_TARGET }}
          arch: ${{ env.ANDROID_ARCH }}
          profile: ${{ env.EMULATOR_PROFILE }}
          force-avd-creation: ${{ steps.avd-cache.outputs.cache-hit != 'true' }}
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            set -x
            cd "$GITHUB_WORKSPACE"

            echo "::group::Environment versions"
            node -v
            npm -v
            adb devices
            echo "::endgroup::"

            adb wait-for-device
            echo "::group::Wait for boot complete"
            for i in $(seq 1 90); do
              boot=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
              if [ "$boot" = "1" ]; then echo "Boot complete (i=$i)"; break; fi
              sleep 2
            done
            [ "$boot" = "1" ] || { echo "::error::Emulator did not finish booting"; exit 1; }
            adb shell input keyevent 82 || true
            echo "::endgroup::"

            echo "::group::Install app under test"
            adb install -r -g "$GITHUB_WORKSPACE/apps/android/QA-Lab.apk"
            adb shell pm list packages | grep arctouch || { echo "::error::App not installed"; exit 1; }
            echo "::endgroup::"

            mkdir -p test-results/logs test-results/screenshots test-results/allure-results

            export APPIUM_HOME="$GITHUB_WORKSPACE/.appium"
            export ANDROID_PLATFORM_VERSION=14
            export ANDROID_DEVICE_NAME=$(adb devices | awk 'NR==2{print $1}')
            export ANDROID_UDID=$ANDROID_DEVICE_NAME
            export ANDROID_APP_PACKAGE=com.arctouch.arctouch_demo_app
            export ANDROID_APP_ACTIVITY=com.arctouch.arctouch_demo_app.MainActivity
            export ANDROID_APP_WAIT_ACTIVITY=com.arctouch.arctouch_demo_app.MainActivity
            export ANDROID_APP_PATH=$GITHUB_WORKSPACE/apps/android/QA-Lab.apk
            export ANDROID_NO_RESET=true
            export APPIUM_HOST=127.0.0.1
            export APPIUM_PORT=4723

            echo "::group::Appium server check"
            npx appium --version
            APPIUM_HOME="$APPIUM_HOME" npx appium driver list --installed
            echo "::endgroup::"

            TAGS='${{ github.event.inputs.tag_expression }}'
            if [ -z "$TAGS" ]; then TAGS='@smoke and @android'; fi
            echo "Running with tag expression: $TAGS"

            set +e
            npx wdio run wdio.android.conf.ts --cucumberOpts.tags="$TAGS" --logLevel info
            WDIO_EXIT=$?
            echo "::notice::WDIO exit code: $WDIO_EXIT"

            echo "::group::test-results contents"
            ls -laR test-results/ 2>&1 | head -100 || true
            echo "::endgroup::"

            echo "::group::Last 200 lines of every wdio log"
            for f in test-results/logs/*.log; do
              [ -f "$f" ] || continue
              echo "----- $f -----"
              tail -200 "$f"
            done
            echo "::endgroup::"

            exit $WDIO_EXIT

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-api-${{ matrix.api-level }}
          path: test-results/allure-results
          if-no-files-found: warn
          retention-days: 14

      - name: Upload diagnostic evidence (screenshots + logs)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostic-evidence-api-${{ matrix.api-level }}
          path: |
            test-results/screenshots
            test-results/logs
            test-results/*.xml
          if-no-files-found: warn
          retention-days: 14
